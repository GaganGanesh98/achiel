services:
  postgres:
    image: postgres:16-alpine
    container_name: campusvoice-postgres
    environment:
      POSTGRES_USER: campusvoice
      POSTGRES_PASSWORD: campusvoice
      POSTGRES_DB: campusvoice
    ports:
      - "5434:5432"
    volumes:
      - campusvoice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusvoice -d campusvoice"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campusvoice-redis
    ports:
      - "6379:6379"
    volumes:
      - campusvoice_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  campusvoice_pgdata:
  campusvoice_redis:
